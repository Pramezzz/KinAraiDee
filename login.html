<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - KinAraiDee</title>
<link rel="icon" type="image/png" href="food/ic0n.jpg">
<link rel="stylesheet" href="style.css">

</head>
<body>

<nav>
  <a href="index.html" class="logo">KinAraiDee</a>
  <div class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
  <div class="menu-nav" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="menu_search.html">Menu Search</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" id="loginLink">Login</a>
    <span id="userBox"></span>
    <a href="#" id="logoutLink" onclick="logout()" style="display:none;">Logout</a>
  </div>
</nav>

<div id="bg-container"></div>

<div class="auth-wrap">
  <div class="auth-panel" id="authPanel">

    <!-- SIGN IN FORM -->
    <div class="panel-form panel-signin">
      <div class="panel-inner">
        <img src="food/ic0n.jpg" alt="KinAraiDee" class="panel-logo">
        <h2>Sign In</h2>
        <p class="panel-sub">ยินดีต้อนรับกลับมา 🍜</p>
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <button class="panel-btn" onclick="login()">Sign In</button>
        <p class="switch-text mobile-only">ยังไม่มีบัญชี? <a onclick="switchToSignup()">สมัครสมาชิก</a></p>
      </div>
    </div>

    <!-- SIGN UP FORM -->
    <div class="panel-form panel-signup">
      <div class="panel-inner">
        <img src="food/ic0n.jpg" alt="KinAraiDee" class="panel-logo">
        <h2>Create Account</h2>
        <p class="panel-sub">เริ่มต้นค้นหาอาหารที่ใช่</p>
        <input type="text" id="signupName" placeholder="Name" autocomplete="name">
        <input type="email" id="signupEmail" placeholder="Email" autocomplete="email">
        <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password">
        <button class="panel-btn" onclick="register()">
          Sign Up
        </button>
        <p class="switch-text mobile-only">มีบัญชีแล้ว? <a onclick="switchToSignin()">เข้าสู่ระบบ</a></p>
      </div>
    </div>

    <!-- SLIDING OVERLAY -->
    <div class="panel-overlay">
      <div class="overlay-track">
        <!-- shown when signin active: nudge to signup -->
        <div class="overlay-side overlay-brand">
          <img src="food/ic0n.jpg" alt="KinAraiDee" class="overlay-logo">
          <h2>KinAraiDee</h2>
          <p>กินอะไรดี?<br>ให้เราช่วยเลือกให้ 🍽</p>
          <button class="overlay-btn" onclick="switchToSignup()">Sign Up</button>
        </div>
        <!-- shown when signup active: nudge to signin -->
        <div class="overlay-side overlay-welcome">
          <img src="food/ic0n.jpg" alt="KinAraiDee" class="overlay-logo">
          <h2>Welcome Back!</h2>
          <p>เข้าสู่ระบบเพื่อค้นหา<br>เมนูที่ใช่สำหรับคุณ</p>
          <button class="overlay-btn" onclick="switchToSignin()">Sign In</button>
        </div>
      </div>
    </div>

  </div>
</div>


<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>

<script>
function switchToSignup() {
  document.getElementById("authPanel").classList.add("signup-active");
}
function switchToSignin() {
  document.getElementById("authPanel").classList.remove("signup-active");
}
</script>

</body>
</html>
